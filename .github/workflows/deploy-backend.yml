# .github/workflows/deploy-backend.yml
name: Deploy Traces Backend API to GCP Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'checkin-be/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: traces-production-39211
  REGION: us-central1
  ARTIFACT_REPOSITORY: traces-containers
  SERVICE_NAME: traces-backend-api
  WIF_PROVIDER: projects/1234567890/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@traces-production-39211.iam.gserviceaccount.com

jobs:
  deployment-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Authenticate securely with GCP using OIDC Workload Identity Federation
      - name: Authenticate with GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'checkin-be/package-lock.json'

      # Run database updates via the direct port before building the container
      - name: Run Database Schema Migrations
        run: |
          cd checkin-be
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        env:
          DIRECT_URL: ${{ secrets.PROD_DATABASE_DIRECT_URL }}

      # Authenticate Docker client against GCP Artifact Registry
      - name: Configure GCP Registry Authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build, tag, and publish the container image to GCP Artifact Registry
      - name: Compile and Push Container Image
        run: |
          cd checkin-be
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.SERVICE_NAME }}:${IMAGE_TAG}
          
          docker build \
            --build-arg DIRECT_URL="postgresql://placeholder_user:placeholder_password@localhost:5432/placeholder_db" \
            -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # Deploy the verified image to Google Cloud Run
      - name: Deploy to GCP Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_URI }}
          flags: '--port=8080 --allow-unauthenticated --max-instances=10 --min-instances=1'
          env_vars: |
            NODE_ENV=production
            DATABASE_URL=${{ secrets.PROD_DATABASE_POOLED_URL }}
            DIRECT_URL=${{ secrets.PROD_DATABASE_DIRECT_URL }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            ALLOWED_ORIGINS=https://aditya211096.github.io
