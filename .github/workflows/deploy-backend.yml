# .github/workflows/deploy-backend.yml
name: Deploy Traces Backend API to GCP Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'checkin-be/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: traces-checkin-app
  SERVICE_NAME: checkin-backend
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPO: cloud-run-source-deploy

jobs:
  deployment-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Authenticate using standard service account key credentials
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'checkin-be/package-lock.json'

      # Run database updates over database session connection prior to builds
      - name: Run Database Schema Migrations
        run: |
          cd checkin-be
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}

      # Authenticate Docker client against GCP Artifact Registry
      - name: Configure GCP Registry Authentication
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Build, tag, and publish the container image to GCP Artifact Registry
      - name: Compile and Push Container Image
        run: |
          cd checkin-be
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${IMAGE_TAG}
          
          docker build \
            --build-arg DIRECT_URL="postgresql://placeholder_user:placeholder_password@localhost:5432/placeholder_db" \
            -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # Deploy the verified image to Google Cloud Run
      - name: Deploy to GCP Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: '--port=8080 --allow-unauthenticated --max-instances=10 --min-instances=1'
          env_vars: |
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET || 'traces_sunrise_secret_key_192837' }}
            WHATSAPP_API_TOKEN=${{ secrets.WHATSAPP_API_TOKEN }}
            WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
            WHATSAPP_BUSINESS_ACCOUNT_ID=${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}
            ALLOWED_ORIGINS=https://aditya211096.github.io
