name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'checkin-frontend/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: 'checkin-frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./checkin-frontend

      - name: Build Application
        run: npm run build
        working-directory: ./checkin-frontend

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CREDENTIALS }}'
          expires: 30d
          projectId: checkin-app-gcp
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
