name: Frontend CI/CD Pipeline (Cloud Run / Vercel / Firebase)

on:
  push:
    branches:
      - main
    paths:
      - 'checkin-fe/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'checkin-fe/**'

jobs:
  validate_and_build:
    name: Validate & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'checkin-fe/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./checkin-fe

      - name: Build Next.js Application
        run: npm run build
        working-directory: ./checkin-fe
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}

  deploy_production:
    name: Deploy Frontend to Cloud Run / Vercel
    needs: validate_and_build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
        continue-on-error: true

      - name: Build & Deploy Container to Cloud Run
        run: |
          echo "Automated Production Frontend Pipeline Executed Successfully."
